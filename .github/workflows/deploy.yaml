name: Deploy

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Release channel"
        required: true
        type: choice
        options: [alpha, beta, early-access, stable, rock-solid]
        default: alpha
      tag:
        description: "Source tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: read
  packages: write

env:
  MODULE_NAME: velero
  REGISTRY: ghcr.io/${{ github.repository_owner }}/modules

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        run: |
          curl -sL "https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin crane

      - name: Promote release tag → channel
        run: |
          SRC="${{ env.REGISTRY }}/${{ env.MODULE_NAME }}/release:${{ inputs.tag }}"
          DST="${{ env.REGISTRY }}/${{ env.MODULE_NAME }}/release:${{ inputs.release_channel }}"
          crane copy "$SRC" "$DST"
          echo "Promoted $SRC → $DST"
